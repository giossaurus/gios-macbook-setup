# Truecolor support (Ghostty)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc,*256col*:Tc"

# Mouse: click to switch pane, drag borders to resize, scroll works
set -g mouse on

# Show pane titles on the border (which agent/tool is in each pane)
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_title} "
set -g pane-active-border-style "fg=colour81"
set -g pane-border-style "fg=colour238"

# Bigger scrollback for long agent output
set -g history-limit 50000

# Start indexing at 1 (easier to reach on keyboard than 0)
set -g base-index 1
setw -g pane-base-index 1

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
